<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google T-Rex + kaktusy</title>
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #f0f7ff 0%, #e8f4ff 35%, #dce9f8 100%);
      display: grid;
      place-items: center;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      color: #0f172a;
    }

    svg {
      width: 100%;
      max-width: 100%;
      height: auto;
      max-height: calc(100vh - 180px);
      image-rendering: pixelated;
      shape-rendering: crispEdges;
      border-radius: 18px;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.08);
      background: transparent;
      display: block;
      touch-action: manipulation;
      user-select: none;
    }

    :root {
      color-scheme: light;
      color: #111827;
      background: #f8fafc;
    }

    * {
      box-sizing: border-box;
    }

    .page {
      max-width: 720px;
      width: min(100%, 100vw);
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 1.25rem;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: #475569;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    button {
      border: none;
      background: linear-gradient(135deg, #0f766e 0%, #22c55e 100%);
      color: #ffffff;
      font: inherit;
      padding: 0.95rem 1.2rem;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.16);
      transition: transform 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      background: #1f2937;
    }

    button:focus-visible {
      outline: 3px solid #93c5fd;
      outline-offset: 3px;
    }

    #jumpBtn {
      position: fixed;
      bottom: 18px;
      right: 18px;
      font-size: 1rem;
      padding: 0.85rem 1.2rem;
      border-radius: 18px;
      z-index: 1000;
      background: linear-gradient(135deg, #0f766e 0%, #22c55e 100%);
      color: #ffffff;
      border: none;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.16);
      cursor: pointer;
      touch-action: manipulation;
    }

    #jumpBtn:hover {
      background: #1f2937;
    }

    .game-frame {
      position: relative;
      width: 100%;
      max-width: 720px;
      margin: 12px auto;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 28px;
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 30px 60px rgba(15, 23, 42, 0.09);
      padding: 16px;
      touch-action: manipulation;
    }


    .status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-top: 16px;
      color: #0f172a;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      letter-spacing: 0.08em;
      font-size: 0.95rem;
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 20px;
      padding: 14px 18px;
      box-shadow: 0 18px 30px rgba(15, 23, 42, 0.08);
    }

    .status span {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      background: rgba(15, 23, 42, 0.04);
      padding: 8px 12px;
      border-radius: 12px;
    }

    .status strong {
      font-weight: 700;
    }

    .footer {
      margin-top: 18px;
      color: #475569;
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 960px) {
      .page {
        width: min(100%, 96vw);
        padding: 16px;
      }

      .game-frame {
        padding: 14px;
      }

      header {
        flex-direction: column;
        align-items: stretch;
      }

      button {
        width: 100%;
      }

      #jumpBtn {
        width: auto;
      }

      .status {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 14px 12px;
      }

      .game-frame {
        padding: 14px;
      }

      h1 {
        font-size: 1.5rem;
      }

      button {
        font-size: 0.95rem;
      }

      p {
        font-size: 0.92rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <main>
      <header aria-labelledby="game-title">
        <div>
          <h1 id="game-title">T-Rex Runner</h1>
          <p>Skákej přes kaktusy. Ovládání: Space nebo ↑ pro skok, ↓ pro dřep, R pro restart.</p>
        </div>
        <button id="restart" type="button">Restart</button>
      </header>

      <div class="game-frame">
        <svg id="game" viewBox="0 0 360 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svg-title" aria-describedby="instructions status-message" focusable="true" tabindex="0">
          <title id="svg-title">T-Rex běhací hra</title>
          <desc id="svg-desc">Skákej přes kaktusy pomocí mezerníku nebo šipky nahoru; dolů pro dřep; R pro restart.</desc>
        <rect width="360" height="160" fill="#e8f4ff"/>
        <rect x="0" y="140" width="360" height="2" fill="#0f172a"/>

        <!-- ===== KOČKA ===== -->
        <g id="player" transform="translate(40 96) scale(0.45)">
          <path id="tail" d="M6 62 C-6 48 -4 22 12 12" stroke="#f59e0b" stroke-width="7" fill="none" stroke-linecap="round"/>
          <path d="M8 40 C2 24 8 12 18 8" stroke="#b45309" stroke-width="3.5" fill="none" stroke-linecap="round"/>
          <ellipse cx="40" cy="62" rx="27" ry="19" fill="#f59e0b"/>
          <ellipse cx="39" cy="61" rx="22" ry="15" fill="#fb923c" opacity="0.72"/>
          <circle cx="42" cy="27" r="17" fill="#f59e0b"/>
          <polygon points="27,20 33,3 39,22" fill="#f59e0b"/>
          <polygon points="46,22 52,4 58,22" fill="#f59e0b"/>
          <polygon points="31,18 34,10 37,19" fill="#7c2d12"/>
          <polygon points="49,19 52,11 55,19" fill="#7c2d12"/>
          <path d="M41 12 l5 6 l-4 3" stroke="#8b5a2b" stroke-width="3" fill="none" stroke-linecap="round"/>
          <circle cx="37" cy="27" r="2.5" fill="#111827"/>
          <circle cx="49" cy="27" r="2.5" fill="#111827"/>
          <circle cx="36" cy="26" r="1" fill="#ffffff" opacity="0.9"/>
          <circle cx="48" cy="26" r="1" fill="#ffffff" opacity="0.9"/>
          <path d="M40 33 q3 4 6 0" stroke="#111827" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <path d="M39 31 l4 3 l4 -3" fill="#7c2d12"/>
          <circle cx="31" cy="33" r="3" fill="#fb7185" opacity="0.55"/>
          <circle cx="55" cy="33" r="3" fill="#fb7185" opacity="0.55"/>
          <line x1="28" y1="32" x2="16" y2="30" stroke="#111827" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="28" y1="36" x2="15" y2="38" stroke="#111827" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="56" y1="32" x2="68" y2="30" stroke="#111827" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="56" y1="36" x2="69" y2="38" stroke="#111827" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M26 49 l10 -6" stroke="#8b5a2b" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M37 46 l12 -7" stroke="#8b5a2b" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M34 57 l11 0" stroke="#8b5a2b" stroke-width="3.5" stroke-linecap="round"/>
          <g id="front-leg">
            <rect x="30" y="75" width="7" height="16" rx="3.5" fill="#f59e0b"/>
            <ellipse cx="33.5" cy="92" rx="5" ry="2.8" fill="#d97706"/>
          </g>
          <g id="back-leg">
            <rect x="50" y="73" width="7" height="18" rx="3.5" fill="#f59e0b"/>
            <ellipse cx="53.5" cy="92" rx="5" ry="2.8" fill="#d97706"/>
          </g>
        </g>

        <g id="obstacles" fill="#111827"></g>

        <rect x="0" y="140" width="360" height="2" fill="#5a5a5a"/>
      </svg>
      </div>
      <button id="jumpBtn" type="button">SKOK</button>
      <div id="instructions" class="visually-hidden" aria-live="polite">Stiskni mezerník nebo šipku nahoru pro skok. Drž šipku dolů pro dřep. Stiskni R pro restart.</div>

    <div id="status-message" class="status" role="status" aria-live="polite" aria-atomic="true">
      <span><strong>SKÓRE</strong> <span id="score">00000</span></span>
      <span><strong>HI</strong> <span id="hi-score">00000</span></span>
    </div>
    </main>
  </div>

  <script>
    (() => {
      const gameWindow = document.getElementById('game');
      const player = document.getElementById('player');
      const obstaclesGroup = document.getElementById('obstacles');
      const scoreEl = document.getElementById('score');
      const hiEl = document.getElementById('hi-score');
      const instructions = document.getElementById('instructions');
      const restartButton = document.getElementById('restart');

      function handlePressJump(event) {
        event.preventDefault();
        gameWindow.focus();
        if (gameOver) {
          reset();
          return;
        }
        jump();
      }

      const SVG_NS = 'http://www.w3.org/2000/svg';
      const WIDTH = 360;
      const HEIGHT = 160;
      const FLOOR = 140;
      const PLAYER_X = 40;
      const PLAYER_BASE_Y = 96;
      const PLAYER_SCALE = 0.45;
      const PLAYER_SCREEN_X = 50;
      const PLAYER_COLLIDE_WIDTH = 24;
      const PLAYER_COLLIDE_HEIGHT = 34;
      const PLAYER_BASE_TRANSFORM = `translate(${PLAYER_X} ${PLAYER_BASE_Y}) scale(${PLAYER_SCALE})`;

      let running = true;
      let started = false;
      let gameOver = false;
      let score = 0;
      let hiScore = 0;
      let speed = 155;
      let lastTime = performance.now();
      let spawnTimer = 0;
      let nextSpawn = 1050;
      const obstacles = [];
      const keys = new Set();
      let playerY = 0;
      let playerVy = 0;
      let playerOnGround = true;
      let playerCrouch = false;
      let runCycle = 0;

      function appendCactus(group, offsetX, height, palette) {
        const cactusWidth = 8 + Math.round(height / 8);
        const armY = FLOOR - height + 7;
        const armHeight = Math.max(6, Math.round(height * 0.24));

        const body = document.createElementNS(SVG_NS, 'rect');
        body.setAttribute('x', String(offsetX));
        body.setAttribute('y', String(FLOOR - height));
        body.setAttribute('width', String(cactusWidth));
        body.setAttribute('height', String(height));
        body.setAttribute('rx', '2.5');
        body.setAttribute('fill', palette.main);

        const bodyShade = document.createElementNS(SVG_NS, 'rect');
        bodyShade.setAttribute('x', String(offsetX + cactusWidth - 3));
        bodyShade.setAttribute('y', String(FLOOR - height + 2));
        bodyShade.setAttribute('width', '2');
        bodyShade.setAttribute('height', String(Math.max(6, height - 4)));
        bodyShade.setAttribute('rx', '1');
        bodyShade.setAttribute('fill', palette.shade);

        const armLeft = document.createElementNS(SVG_NS, 'rect');
        armLeft.setAttribute('x', String(offsetX - 3));
        armLeft.setAttribute('y', String(armY));
        armLeft.setAttribute('width', '4');
        armLeft.setAttribute('height', String(armHeight));
        armLeft.setAttribute('rx', '2');
        armLeft.setAttribute('fill', palette.main);

        const armLeftTop = document.createElementNS(SVG_NS, 'rect');
        armLeftTop.setAttribute('x', String(offsetX - 6));
        armLeftTop.setAttribute('y', String(armY));
        armLeftTop.setAttribute('width', '6');
        armLeftTop.setAttribute('height', '4');
        armLeftTop.setAttribute('rx', '2');
        armLeftTop.setAttribute('fill', palette.main);

        const armRight = document.createElementNS(SVG_NS, 'rect');
        armRight.setAttribute('x', String(offsetX + cactusWidth - 1));
        armRight.setAttribute('y', String(armY - 4));
        armRight.setAttribute('width', '4');
        armRight.setAttribute('height', String(Math.max(7, armHeight + 2)));
        armRight.setAttribute('rx', '2');
        armRight.setAttribute('fill', palette.highlight);

        const armRightTop = document.createElementNS(SVG_NS, 'rect');
        armRightTop.setAttribute('x', String(offsetX + cactusWidth + 1));
        armRightTop.setAttribute('y', String(armY - 4));
        armRightTop.setAttribute('width', '6');
        armRightTop.setAttribute('height', '4');
        armRightTop.setAttribute('rx', '2');
        armRightTop.setAttribute('fill', palette.highlight);

        const spikes = [4, Math.round(height * 0.45), Math.round(height * 0.78)];
        spikes.forEach((segment) => {
          const spineLeft = document.createElementNS(SVG_NS, 'line');
          spineLeft.setAttribute('x1', String(offsetX + 2));
          spineLeft.setAttribute('y1', String(FLOOR - segment));
          spineLeft.setAttribute('x2', String(offsetX - 1));
          spineLeft.setAttribute('y2', String(FLOOR - segment - 2));
          spineLeft.setAttribute('stroke', palette.spine);
          spineLeft.setAttribute('stroke-width', '1');
          spineLeft.setAttribute('stroke-linecap', 'round');

          const spineRight = document.createElementNS(SVG_NS, 'line');
          spineRight.setAttribute('x1', String(offsetX + cactusWidth - 2));
          spineRight.setAttribute('y1', String(FLOOR - segment + 1));
          spineRight.setAttribute('x2', String(offsetX + cactusWidth + 1));
          spineRight.setAttribute('y2', String(FLOOR - segment - 1));
          spineRight.setAttribute('stroke', palette.spine);
          spineRight.setAttribute('stroke-width', '1');
          spineRight.setAttribute('stroke-linecap', 'round');

          group.appendChild(spineLeft);
          group.appendChild(spineRight);
        });

        group.appendChild(armLeft);
        group.appendChild(armLeftTop);
        group.appendChild(armRight);
        group.appendChild(armRightTop);
        group.appendChild(body);
        group.appendChild(bodyShade);

        return cactusWidth;
      }

      function createObstacle() {
        const palettes = [
          { main: '#2f9e44', highlight: '#4ade80', shade: '#1f7a34', spine: '#14532d' },
          { main: '#16a34a', highlight: '#86efac', shade: '#166534', spine: '#14532d' },
          { main: '#22c55e', highlight: '#bbf7d0', shade: '#15803d', spine: '#166534' }
        ];
        const variants = [
          [18],
          [22],
          [18, 22],
          [22, 18]
        ];
        const heights = variants[Math.floor(Math.random() * variants.length)];
        const group = document.createElementNS(SVG_NS, 'g');
        let cursorX = 0;
        let maxHeight = 0;

        heights.forEach((height, index) => {
          const palette = palettes[(Math.floor(Math.random() * palettes.length) + index) % palettes.length];
          const width = appendCactus(group, cursorX, height, palette);
          cursorX += width + (heights.length > 1 ? 5 : 0);
          maxHeight = Math.max(maxHeight, height);
        });

        return {
          element: group,
          width: Math.max(10, cursorX - (heights.length > 1 ? 5 : 0)),
          height: maxHeight
        };
      }

      function updateObstacleElement(obstacle) {
        obstacle.element.setAttribute('transform', `translate(${obstacle.x} 0)`);
      }

      function spawnObstacle() {
        const obstacleShape = createObstacle();
        const obstacle = {
          x: WIDTH + 20,
          y: FLOOR,
          w: obstacleShape.width,
          h: obstacleShape.height,
          element: obstacleShape.element
        };

        obstaclesGroup.appendChild(obstacle.element);
        obstacles.push(obstacle);
        updateObstacleElement(obstacle);
      }

      function reset() {
        running = true;
        started = false;
        gameOver = false;
        score = 0;
        speed = 155;
        spawnTimer = 0;
        nextSpawn = 1050;
        obstacles.length = 0;
        playerY = 0;
        playerVy = 0;
        playerOnGround = true;
        playerCrouch = false;
        runCycle = 0;
        while (obstaclesGroup.firstChild) {
          obstaclesGroup.removeChild(obstaclesGroup.firstChild);
        }
        player.setAttribute('transform', PLAYER_BASE_TRANSFORM);
        updateStatus('Hra připravena. Stiskni mezerník pro start.');
        announceScore();
        lastTime = performance.now();
        requestAnimationFrame(loop);
      }

      function updateStatus(text) {
        instructions.textContent = text;
      }

      function announceScore() {
        scoreEl.textContent = String(score).padStart(5, '0');
        hiEl.textContent = String(hiScore).padStart(5, '0');
      }

      function collides(obstacle) {
        const playerBox = {
          x: PLAYER_SCREEN_X,
          y: FLOOR - PLAYER_COLLIDE_HEIGHT + playerY,
          w: PLAYER_COLLIDE_WIDTH,
          h: PLAYER_COLLIDE_HEIGHT
        };
        const obstacleBox = {
          x: obstacle.x,
          y: obstacle.y - obstacle.h,
          w: obstacle.w,
          h: obstacle.h
        };

        return playerBox.x < obstacleBox.x + obstacleBox.w &&
               playerBox.x + playerBox.w > obstacleBox.x &&
               playerBox.y < obstacleBox.y + obstacleBox.h &&
               playerBox.y + playerBox.h > obstacleBox.y;
      }

      function update(dt) {
        if (!running) return;

        playerCrouch = keys.has('ArrowDown') && playerOnGround;

        playerVy += playerVy > 0 ? 1.05 : 0.7;
        playerY += playerVy;

        if (playerY >= 0) {
          playerY = 0;
          playerVy = 0;
          playerOnGround = true;
        } else {
          playerOnGround = false;
        }

        playerY = Math.max(playerY, -128);

        obstacles.forEach((obstacle) => {
          obstacle.x -= speed * dt;
          updateObstacleElement(obstacle);
        });

        if (started && !gameOver) {
          spawnTimer += dt * 1000;
          if (spawnTimer > nextSpawn) {
            spawnTimer = 0;
            nextSpawn = 900 + Math.random() * 500;
            spawnObstacle();
          }
        }

        for (let i = obstacles.length - 1; i >= 0; i -= 1) {
          const obstacle = obstacles[i];
          if (obstacle.x + obstacle.w < -20) {
            obstaclesGroup.removeChild(obstacle.element);
            obstacles.splice(i, 1);
            continue;
          }
          if (!gameOver && collides(obstacle)) {
            running = false;
            gameOver = true;
            hiScore = Math.max(hiScore, score);
            updateStatus('Hra skončila. Stiskni R pro restart.');
          }
        }

        if (started && !gameOver) {
          score += Math.floor(dt * 165);
          announceScore();
        }

        if (started && playerOnGround && !gameOver) {
          runCycle += dt * 12;
        }
      }

      function render() {
        player.setAttribute('transform', `${PLAYER_BASE_TRANSFORM} translate(0 ${playerY})`);
        const frontLeg = document.getElementById('front-leg');
        const backLeg = document.getElementById('back-leg');
        const tail = document.getElementById('tail');
        const legOffset = playerOnGround && started && !gameOver ? Math.sin(runCycle) * 3 : 0;
        const tailSwing = playerOnGround && started && !gameOver ? Math.sin(runCycle * 0.9) * 2.5 : -1.5;

        frontLeg.setAttribute('transform', `translate(0 ${legOffset})`);
        backLeg.setAttribute('transform', `translate(0 ${-legOffset})`);
        tail.setAttribute('transform', `rotate(${tailSwing} 12 16)`);
      }

      function loop(timestamp) {
        const dt = Math.min(0.04, (timestamp - lastTime) / 1000);
        lastTime = timestamp;
        update(dt);
        render();
        if (running) {
          requestAnimationFrame(loop);
        }
      }

      function jump() {
        if (gameOver) {
          return;
        }
        if (!started) {
          started = true;
          updateStatus('Hra běží. Hodně štěstí!');
        }
        if (playerOnGround) {
          playerVy = -14.5;
          playerOnGround = false;
          updateStatus('Skáčeš!');
        }
      }

      window.addEventListener('keydown', (event) => {
        if (['Space', 'ArrowUp', 'ArrowDown', 'KeyR'].includes(event.code)) {
          event.preventDefault();
        }
        keys.add(event.code);
        if (event.code === 'Space' || event.code === 'ArrowUp') {
          jump();
        }
        if (event.code === 'KeyR') {
          reset();
        }
      });

      window.addEventListener('keyup', (event) => {
        keys.delete(event.code);
      });

      const jumpButton = document.getElementById('jumpBtn');
      jumpButton.addEventListener('click', jump);
      jumpButton.addEventListener('pointerdown', handlePressJump);

      restartButton.addEventListener('click', reset);
      restartButton.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        reset();
      });

      gameWindow.addEventListener('click', () => {
        gameWindow.focus();
        if (gameOver) {
          reset();
        }
      });

      gameWindow.addEventListener('pointerdown', handlePressJump);

      gameWindow.addEventListener('focus', () => {
        gameWindow.style.outline = '3px solid #93c5fd';
      });

      gameWindow.addEventListener('blur', () => {
        gameWindow.style.outline = 'none';
      });

      updateStatus('Stiskni mezerník pro start.');
      announceScore();
      lastTime = performance.now();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
