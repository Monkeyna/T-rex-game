<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eliška &amp; Hermínka vs. Kaktusy 🌵</title>
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #f0f7ff 0%, #e8f4ff 35%, #dce9f8 100%);
      display: grid;
      place-items: center;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      color: #0f172a;
    }

    svg {
      width: 100%;
      max-width: 100%;
      height: auto;
      max-height: calc(100vh - 130px);
      min-height: 380px;
      image-rendering: pixelated;
      shape-rendering: crispEdges;
      border-radius: 18px;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.08);
      background: transparent;
      display: block;
      touch-action: manipulation;
      user-select: none;
    }

    :root {
      color-scheme: light;
      color: #111827;
      background: #f8fafc;
    }

    * {
      box-sizing: border-box;
    }

    .page {
      max-width: 980px;
      width: min(100%, 100vw);
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .audio-controls {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.28);
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
    }

    .audio-controls label {
      font-size: 0.72rem;
      color: #334155;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .audio-controls input[type="range"] {
      width: 62px;
      accent-color: #16a34a;
    }

    h1 {
      margin: 0;
      font-size: 1.25rem;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: #475569;
      font-size: 0.82rem;
      line-height: 1.4;
    }

    button {
      border: none;
      background: linear-gradient(135deg, #0f766e 0%, #22c55e 100%);
      color: #ffffff;
      font: inherit;
      padding: 0.78rem 1rem;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.16);
      transition: transform 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      background: #1f2937;
    }

    button:focus-visible {
      outline: 3px solid #93c5fd;
      outline-offset: 3px;
    }

    #jumpBtn {
      position: fixed;
      bottom: 18px;
      right: 18px;
      font-size: 1rem;
      padding: 0.85rem 1.2rem;
      border-radius: 18px;
      z-index: 1000;
      background: linear-gradient(135deg, #0f766e 0%, #22c55e 100%);
      color: #ffffff;
      border: none;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.16);
      cursor: pointer;
      touch-action: manipulation;
    }

    #jumpBtn:hover {
      background: #1f2937;
    }

    .game-frame {
      position: relative;
      width: 100%;
      max-width: 980px;
      margin: 8px auto;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 28px;
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 30px 60px rgba(15, 23, 42, 0.09);
      padding: 12px;
      touch-action: manipulation;
    }


    .status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-top: 16px;
      color: #0f172a;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      letter-spacing: 0.08em;
      font-size: 0.95rem;
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 20px;
      padding: 14px 18px;
      box-shadow: 0 18px 30px rgba(15, 23, 42, 0.08);
    }

    .status span {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      background: rgba(15, 23, 42, 0.04);
      padding: 8px 12px;
      border-radius: 12px;
    }

    .status strong {
      font-weight: 700;
    }

    .footer {
      margin-top: 18px;
      color: #475569;
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 960px) {
      .page {
        width: min(100%, 96vw);
        padding: 16px;
      }

      .game-frame {
        padding: 10px;
      }

      header {
        flex-direction: column;
        align-items: stretch;
      }

      .header-actions {
        justify-content: space-between;
      }

      button {
        width: 100%;
      }

      #jumpBtn {
        width: auto;
      }

      .status {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 640px) {
      body {
        align-items: start;
        padding-top: 8px;
      }

      .page {
        width: 100vw;
        padding: 8px 10px 96px;
        gap: 8px;
      }

      .game-frame {
        margin: 6px auto;
        padding: 8px;
      }

      svg {
        width: 100%;
        min-height: 320px;
        max-height: calc(100vh - 170px);
      }

      h1 {
        font-size: 1.2rem;
      }

      button {
        font-size: 0.9rem;
      }

      p {
        font-size: 0.88rem;
      }

      .status {
        margin-top: 10px;
        padding: 10px 12px;
      }
    }
  </style>
</head>

      function handlePressJump(event) {
        event.preventDefault();
        gameWindow.focus();
        if (gameOver) {
          reset();
          return;
        }
        startMusic();
        jump();
      }

      const SVG_NS = 'http://www.w3.org/2000/svg';
      const IS_MOBILE = window.matchMedia('(max-width: 640px)').matches;
      const WIDTH = 360;
      const HEIGHT = 160;
      const FLOOR = 140;
      const PLAYER_X = 40;
      const PLAYER_BASE_Y = 96;
      const PLAYER_SCALE = 0.45;
      const PLAYER_SCREEN_X = 50;
      const PLAYER_COLLIDE_WIDTH = 24;
      const PLAYER_COLLIDE_HEIGHT = 34;
      const PLAYER_BASE_TRANSFORM = `translate(${PLAYER_X} ${PLAYER_BASE_Y}) scale(${PLAYER_SCALE})`;
      const JUMP_VELOCITY = IS_MOBILE ? -16 : -14.5;
      const GRAVITY_ASCEND = IS_MOBILE ? 0.52 : 0.7;
      const GRAVITY_DESCEND = IS_MOBILE ? 0.86 : 1.05;
      const BIRD_FLIGHT_LEVELS = IS_MOBILE ? [84, 78] : [86, 80, 74];
      const MELODY = [
        { root: 164.81, bass: 82.41, lead: 329.63, duration: 0.24, gap: 0.22 },
        { root: 196.0, bass: 98.0, lead: 392.0, duration: 0.22, gap: 0.18 },
        { root: 220.0, bass: 110.0, lead: 440.0, duration: 0.24, gap: 0.2 },
        { root: 196.0, bass: 98.0, lead: 392.0, duration: 0.22, gap: 0.16 },
        { root: 246.94, bass: 123.47, lead: 493.88, duration: 0.26, gap: 0.2 },
        { root: 220.0, bass: 110.0, lead: 440.0, duration: 0.28, gap: 0.28 }
      ];

      let running = true;
      let started = false;
      let gameOver = false;
      let score = 0;
      let hiScore = 0;
      let speed = 190;
      let lastTime = performance.now();
      let spawnTimer = 0;
      let nextSpawn = 820;
      const obstacles = [];
      const keys = new Set();
      let playerY = 0;
      let playerVy = 0;
      let playerOnGround = true;
      let playerCrouch = false;
      let runCycle = 0;
      let birdFlapCycle = 0;
      let backgroundScroll = 0;
      let weatherCycle = 0;
      let spawnHistory = ['bird'];
      let audioCtx = null;
      let musicStarted = false;
      let musicTimer = null;
      let melodyIndex = 0;
      let masterGain = null;
      let isMuted = false;
      let volumeLevel = Number(volumeControl.value) / 100;

      function chooseNextObstacleKind() {
        const lastKind = spawnHistory[spawnHistory.length - 1];
        const previousKind = spawnHistory[spawnHistory.length - 2];
        const roll = Math.random();

        if (lastKind === 'bird' && previousKind === 'bird') {
          return 'cactus';
        }

        if (lastKind === 'cactus' && previousKind === 'cactus') {
          return roll < 0.7 ? 'bird' : 'cactus';
        }

        if (lastKind === 'bird') {
          return roll < 0.42 ? 'bird' : 'cactus';
        }

        if (lastKind === 'cactus') {
          return roll < 0.58 ? 'bird' : 'cactus';
        }

        return roll < 0.5 ? 'bird' : 'cactus';
      }

      function ensureAudioContext() {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          return null;
        }
        if (!audioCtx) {
          audioCtx = new AudioContextClass();
          masterGain = audioCtx.createGain();
          masterGain.gain.value = volumeLevel;
          masterGain.connect(audioCtx.destination);
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        return audioCtx;
      }

      function syncVolume() {
        if (masterGain) {
          masterGain.gain.setTargetAtTime(isMuted ? 0.0001 : Math.max(0.0001, volumeLevel), audioCtx.currentTime, 0.01);
        }
        soundToggle.textContent = isMuted ? 'Zvuk vypnut' : 'Zvuk zapnut';
        soundToggle.setAttribute('aria-pressed', String(isMuted));
      }

      function playTone(frequency, duration, options = {}) {
        const context = ensureAudioContext();
        if (!context || !frequency) {
          return;
        }

        const oscillator = context.createOscillator();
        const gain = context.createGain();
        const type = options.type || 'triangle';
        const volume = options.volume ?? 0.03;
        const attack = options.attack ?? 0.01;
        const release = options.release ?? 0.08;
        const delay = options.delay ?? 0;
        const startAt = context.currentTime + delay;
        const endAt = startAt + duration;

        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, startAt);
        if (options.endFrequency) {
          oscillator.frequency.exponentialRampToValueAtTime(options.endFrequency, endAt);
        }

        gain.gain.setValueAtTime(0.0001, startAt);
        gain.gain.exponentialRampToValueAtTime(volume, startAt + attack);
        gain.gain.exponentialRampToValueAtTime(0.0001, endAt + release);

        oscillator.connect(gain);
        gain.connect(masterGain);
        oscillator.start(startAt);
        oscillator.stop(endAt + release + 0.02);
      }

      function playChord(frequencies, duration, options = {}) {
        frequencies.forEach((frequency, index) => {
          playTone(frequency, duration, {
            ...options,
            delay: (options.delay ?? 0) + index * 0.005
          });
        });
      }

      function startMusic() {
        if (musicStarted) {
          ensureAudioContext();
          return;
        }

        const context = ensureAudioContext();
        if (!context) {
          return;
        }

        musicStarted = true;
        const playNextNote = () => {
          const note = MELODY[melodyIndex % MELODY.length];
          melodyIndex += 1;
          playTone(note.bass, note.duration + 0.06, {
            type: 'sine',
            volume: 0.03,
            attack: 0.012,
            release: 0.16,
            endFrequency: note.bass * 0.98
          });
          playTone(note.bass * 2, note.duration * 0.55, {
            type: 'triangle',
            volume: 0.012,
            attack: 0.008,
            release: 0.08,
            delay: 0.01,
            endFrequency: note.bass * 1.9
          });
          playChord([note.root, note.root * 1.25, note.root * 1.5], note.duration + 0.12, {
            type: 'sine',
            volume: 0.008,
            attack: 0.04,
            release: 0.24,
            delay: 0.02
          });
          playTone(note.lead, note.duration * 0.75, {
            type: 'triangle',
            volume: 0.013,
            attack: 0.01,
            release: 0.09,
            delay: 0.015,
            endFrequency: note.lead * 1.04
          });
          playTone(note.lead * 1.5, 0.03, {
            type: 'square',
            volume: 0.006,
            attack: 0.002,
            release: 0.018,
            delay: 0.08
          });
          playTone(note.lead * 1.8, 0.02, {
            type: 'square',
            volume: 0.0045,
            attack: 0.002,
            release: 0.015,
            delay: 0.155
          });
          playTone(note.lead * 0.75, 0.11, {
            type: 'sine',
            volume: 0.009,
            attack: 0.008,
            release: 0.08,
            delay: 0.1,
            endFrequency: note.lead * 0.7
          });

          musicTimer = window.setTimeout(playNextNote, note.gap * 1000);
        };

        playNextNote();
      }

      function playMeow() {
        const context = ensureAudioContext();
        if (!context) {
          return;
        }

        playTone(1174.66, 0.12, { type: 'triangle', volume: 0.05, attack: 0.005, release: 0.06, endFrequency: 932.33 });
        playTone(932.33, 0.22, { type: 'triangle', volume: 0.11, attack: 0.008, release: 0.12, delay: 0.03, endFrequency: 698.46 });
        playTone(698.46, 0.44, { type: 'sine', volume: 0.16, attack: 0.012, release: 0.24, delay: 0.08, endFrequency: 349.23 });
        playTone(1396.91, 0.15, { type: 'sine', volume: 0.028, attack: 0.005, release: 0.08, delay: 0.05, endFrequency: 1046.5 });
        playTone(1567.98, 0.04, { type: 'square', volume: 0.038, attack: 0.002, release: 0.03, delay: 0.18, endFrequency: 1244.51 });
        playTone(1318.51, 0.04, { type: 'square', volume: 0.032, attack: 0.002, release: 0.03, delay: 0.24, endFrequency: 1046.5 });
        playTone(1760, 0.035, { type: 'triangle', volume: 0.022, attack: 0.002, release: 0.02, delay: 0.3, endFrequency: 1567.98 });
      }

      function toggleSound(event) {
        event.preventDefault();
        ensureAudioContext();
        isMuted = !isMuted;
        syncVolume();
      }

      function appendCactus(group, offsetX, height, palette) {
        const cactusWidth = 8 + Math.round(height / 8);
        const armY = FLOOR - height + 7;
        const armHeight = Math.max(6, Math.round(height * 0.24));

        const body = document.createElementNS(SVG_NS, 'rect');
        body.setAttribute('x', String(offsetX));
        body.setAttribute('y', String(FLOOR - height));
        body.setAttribute('width', String(cactusWidth));
        body.setAttribute('height', String(height));
        body.setAttribute('rx', '2.5');
        body.setAttribute('fill', palette.main);

        const bodyShade = document.createElementNS(SVG_NS, 'rect');
        bodyShade.setAttribute('x', String(offsetX + cactusWidth - 3));
        bodyShade.setAttribute('y', String(FLOOR - height + 2));
        bodyShade.setAttribute('width', '2');
        bodyShade.setAttribute('height', String(Math.max(6, height - 4)));
        bodyShade.setAttribute('rx', '1');
        bodyShade.setAttribute('fill', palette.shade);

        const armLeft = document.createElementNS(SVG_NS, 'rect');
        armLeft.setAttribute('x', String(offsetX - 3));
        armLeft.setAttribute('y', String(armY));
        armLeft.setAttribute('width', '4');
        armLeft.setAttribute('height', String(armHeight));
        armLeft.setAttribute('rx', '2');
        armLeft.setAttribute('fill', palette.main);

        const armLeftTop = document.createElementNS(SVG_NS, 'rect');
        armLeftTop.setAttribute('x', String(offsetX - 6));
        armLeftTop.setAttribute('y', String(armY));
        armLeftTop.setAttribute('width', '6');
        armLeftTop.setAttribute('height', '4');
        armLeftTop.setAttribute('rx', '2');
        armLeftTop.setAttribute('fill', palette.main);

        const armRight = document.createElementNS(SVG_NS, 'rect');
        armRight.setAttribute('x', String(offsetX + cactusWidth - 1));
        armRight.setAttribute('y', String(armY - 4));
        armRight.setAttribute('width', '4');
        armRight.setAttribute('height', String(Math.max(7, armHeight + 2)));
        armRight.setAttribute('rx', '2');
        armRight.setAttribute('fill', palette.highlight);

        const armRightTop = document.createElementNS(SVG_NS, 'rect');
        armRightTop.setAttribute('x', String(offsetX + cactusWidth + 1));
        armRightTop.setAttribute('y', String(armY - 4));
        armRightTop.setAttribute('width', '6');
        armRightTop.setAttribute('height', '4');
        armRightTop.setAttribute('rx', '2');
        armRightTop.setAttribute('fill', palette.highlight);

        const spikes = [4, Math.round(height * 0.45), Math.round(height * 0.78)];
        spikes.forEach((segment) => {
          const spineLeft = document.createElementNS(SVG_NS, 'line');
          spineLeft.setAttribute('x1', String(offsetX + 2));
          spineLeft.setAttribute('y1', String(FLOOR - segment));
          spineLeft.setAttribute('x2', String(offsetX - 1));
          spineLeft.setAttribute('y2', String(FLOOR - segment - 2));
          spineLeft.setAttribute('stroke', palette.spine);
          spineLeft.setAttribute('stroke-width', '1');
          spineLeft.setAttribute('stroke-linecap', 'round');

          const spineRight = document.createElementNS(SVG_NS, 'line');
          spineRight.setAttribute('x1', String(offsetX + cactusWidth - 2));
          spineRight.setAttribute('y1', String(FLOOR - segment + 1));
          spineRight.setAttribute('x2', String(offsetX + cactusWidth + 1));
          spineRight.setAttribute('y2', String(FLOOR - segment - 1));
          spineRight.setAttribute('stroke', palette.spine);
          spineRight.setAttribute('stroke-width', '1');
          spineRight.setAttribute('stroke-linecap', 'round');

          group.appendChild(spineLeft);
          group.appendChild(spineRight);
        });

        group.appendChild(armLeft);
        group.appendChild(armLeftTop);
        group.appendChild(armRight);
        group.appendChild(armRightTop);
        group.appendChild(body);
        group.appendChild(bodyShade);

        return cactusWidth;
      }

      function createCactusObstacle() {
        const palettes = [
          { main: '#2f9e44', highlight: '#4ade80', shade: '#1f7a34', spine: '#14532d' },
          { main: '#16a34a', highlight: '#86efac', shade: '#166534', spine: '#14532d' },
          { main: '#22c55e', highlight: '#bbf7d0', shade: '#15803d', spine: '#166534' }
        ];
        const variants = [
          [18],
          [22],
          [18, 22],
          [22, 18]
        ];
        const heights = variants[Math.floor(Math.random() * variants.length)];
        const group = document.createElementNS(SVG_NS, 'g');
        let cursorX = 0;
        let maxHeight = 0;

        heights.forEach((height, index) => {
          const palette = palettes[(Math.floor(Math.random() * palettes.length) + index) % palettes.length];
          const width = appendCactus(group, cursorX, height, palette);
          cursorX += width + (heights.length > 1 ? 5 : 0);
          maxHeight = Math.max(maxHeight, height);
        });

        return {
          kind: 'cactus',
          element: group,
          width: Math.max(10, cursorX - (heights.length > 1 ? 5 : 0)),
          height: maxHeight,
          y: FLOOR
        };
      }

      function createBirdObstacle() {
        const group = document.createElementNS(SVG_NS, 'g');
        const bottomY = BIRD_FLIGHT_LEVELS[Math.floor(Math.random() * BIRD_FLIGHT_LEVELS.length)];
        const body = document.createElementNS(SVG_NS, 'ellipse');
        body.setAttribute('cx', '17');
        body.setAttribute('cy', '8');
        body.setAttribute('rx', '8');
        body.setAttribute('ry', '5');
        body.setAttribute('fill', '#111111');

        const head = document.createElementNS(SVG_NS, 'circle');
        head.setAttribute('cx', '8');
        head.setAttribute('cy', '6');
        head.setAttribute('r', '3');
        head.setAttribute('fill', '#111111');

        const beak = document.createElementNS(SVG_NS, 'polygon');
        beak.setAttribute('points', '5,6 0,4 4,8');
        beak.setAttribute('fill', '#f59e0b');

        const tail = document.createElementNS(SVG_NS, 'path');
        tail.setAttribute('d', 'M26 8 l7 -4 l-4 5 l4 5 z');
        tail.setAttribute('fill', '#111111');

        const belly = document.createElementNS(SVG_NS, 'path');
        belly.setAttribute('d', 'M11 10 q6 5 13 0');
        belly.setAttribute('stroke', '#e5e7eb');
        belly.setAttribute('stroke-width', '1.5');
        belly.setAttribute('fill', 'none');
        belly.setAttribute('stroke-linecap', 'round');

        const wingLeft = document.createElementNS(SVG_NS, 'path');
        wingLeft.setAttribute('d', 'M17 7 q8 -8 15 -4 q-8 0 -11 8');
        wingLeft.setAttribute('fill', '#0f172a');
        wingLeft.setAttribute('id', `bird-wing-left-${Math.random().toString(36).slice(2, 8)}`);

        const wingRight = document.createElementNS(SVG_NS, 'path');
        wingRight.setAttribute('d', 'M18 7 q2 -9 -6 -12 q2 6 -4 12');
        wingRight.setAttribute('fill', '#1f2937');
        wingRight.setAttribute('id', `bird-wing-right-${Math.random().toString(36).slice(2, 8)}`);

        group.appendChild(tail);
        group.appendChild(wingLeft);
        group.appendChild(wingRight);
        group.appendChild(body);
        group.appendChild(head);
        group.appendChild(beak);
        group.appendChild(belly);

        return {
          kind: 'bird',
          element: group,
          width: 31,
          height: 18,
          y: bottomY,
          wingLeft,
          wingRight,
          flapOffset: Math.random() * Math.PI * 2
        };
      }

      function updateObstacleElement(obstacle) {
        if (obstacle.kind === 'bird') {
          obstacle.element.setAttribute('transform', `translate(${obstacle.x} ${obstacle.y - obstacle.h})`);
        } else {
          obstacle.element.setAttribute('transform', `translate(${obstacle.x} 0)`);
        }

        if (obstacle.kind === 'bird') {
          const flap = Math.sin(birdFlapCycle + obstacle.flapOffset) * 12;
          obstacle.wingLeft.setAttribute('transform', `rotate(${flap} 14 7)`);
          obstacle.wingRight.setAttribute('transform', `rotate(${-flap * 0.9} 14 7)`);
        }
      }

      function spawnObstacle() {
        const nextKind = chooseNextObstacleKind();
        const obstacleShape = nextKind === 'bird' ? createBirdObstacle() : createCactusObstacle();
        const obstacle = {
          x: WIDTH + 20,
          y: obstacleShape.y,
          w: obstacleShape.width,
          h: obstacleShape.height,
          kind: obstacleShape.kind,
          element: obstacleShape.element,
          wingLeft: obstacleShape.wingLeft,
          wingRight: obstacleShape.wingRight,
          flapOffset: obstacleShape.flapOffset || 0
        };

        obstaclesGroup.appendChild(obstacle.element);
        obstacles.push(obstacle);
        spawnHistory.push(obstacle.kind);
        if (spawnHistory.length > 3) {
          spawnHistory.shift();
        }
        updateObstacleElement(obstacle);
      }

      function reset() {
        running = true;
        started = false;
        gameOver = false;
        score = 0;
        speed = 190;
        spawnTimer = 0;
        nextSpawn = 820;
        obstacles.length = 0;
        playerY = 0;
        playerVy = 0;
        playerOnGround = true;
        playerCrouch = false;
        runCycle = 0;
        birdFlapCycle = 0;
        backgroundScroll = 0;
        weatherCycle = 0;
        spawnHistory = ['bird'];
        while (obstaclesGroup.firstChild) {
          obstaclesGroup.removeChild(obstaclesGroup.firstChild);
        }
        player.setAttribute('transform', PLAYER_BASE_TRANSFORM);
        updateStatus('Hra připravena. Stiskni mezerník pro start.');
        announceScore();
        lastTime = performance.now();
        requestAnimationFrame(loop);
      }

      function updateStatus(text) {
        instructions.textContent = text;
      }

      function announceScore() {
        scoreEl.textContent = String(score).padStart(5, '0');
        hiEl.textContent = String(hiScore).padStart(5, '0');
      }

      function collides(obstacle) {
        const playerBox = {
          x: PLAYER_SCREEN_X,
          y: FLOOR - PLAYER_COLLIDE_HEIGHT + playerY,
          w: PLAYER_COLLIDE_WIDTH,
          h: PLAYER_COLLIDE_HEIGHT
        };
        const obstacleBox = {
          x: obstacle.x,
          y: obstacle.y - obstacle.h,
          w: obstacle.w,
          h: obstacle.h
        };

        return playerBox.x < obstacleBox.x + obstacleBox.w &&
               playerBox.x + playerBox.w > obstacleBox.x &&
               playerBox.y < obstacleBox.y + obstacleBox.h &&
               playerBox.y + playerBox.h > obstacleBox.y;
      }

      function update(dt) {
        if (!running) return;

        playerCrouch = keys.has('ArrowDown') && playerOnGround;

        playerVy += playerVy > 0 ? GRAVITY_DESCEND : GRAVITY_ASCEND;
        playerY += playerVy;

        if (playerY >= 0) {
          playerY = 0;
          playerVy = 0;
          playerOnGround = true;
        } else {
          playerOnGround = false;
        }

        playerY = Math.max(playerY, -128);

        obstacles.forEach((obstacle) => {
          obstacle.x -= speed * dt;
          updateObstacleElement(obstacle);
        });

        if (started && !gameOver) {
          spawnTimer += dt * 1000;
          if (spawnTimer > nextSpawn) {
            spawnTimer = 0;
            nextSpawn = 700 + Math.random() * 360;
            spawnObstacle();
          }
        }

        for (let i = obstacles.length - 1; i >= 0; i -= 1) {
          const obstacle = obstacles[i];
          if (obstacle.x + obstacle.w < -20) {
            obstaclesGroup.removeChild(obstacle.element);
            obstacles.splice(i, 1);
            continue;
          }
          if (!gameOver && collides(obstacle)) {
            running = false;
            gameOver = true;
            hiScore = Math.max(hiScore, score);
            updateStatus('Hra skončila. Stiskni R pro restart.');
            playMeow();
          }
        }

        if (started && !gameOver) {
          score += Math.floor(dt * 210);
          announceScore();
        }

        birdFlapCycle += dt * (started && !gameOver ? 16 : 8);
        backgroundScroll += dt * (started && !gameOver ? speed : 42);
        weatherCycle += dt * 0.06;

        if (started && playerOnGround && !gameOver) {
          runCycle += dt * 12;
        }
      }

      function render() {
        player.setAttribute('transform', `${PLAYER_BASE_TRANSFORM} translate(0 ${playerY})`);
        const frontLeg = document.getElementById('front-leg');
        const backLeg = document.getElementById('back-leg');
        const tail = document.getElementById('tail');
        const legOffset = playerOnGround && started && !gameOver ? Math.sin(runCycle) * 3 : 0;
        const tailSwing = playerOnGround && started && !gameOver ? Math.sin(runCycle * 0.9) * 2.5 : -1.5;

        frontLeg.setAttribute('transform', `translate(0 ${legOffset})`);
        backLeg.setAttribute('transform', `translate(0 ${-legOffset})`);
        tail.setAttribute('transform', `rotate(${tailSwing} 12 16)`);

        const farOffset = -(backgroundScroll * 0.12 % 360);
        const nearOffset = -(backgroundScroll * 0.24 % 360);
        bgFarA.setAttribute('transform', `translate(${farOffset} 0)`);
        bgFarB.setAttribute('transform', `translate(${farOffset + 360} 0)`);
        bgNearA.setAttribute('transform', `translate(${nearOffset} 0)`);
        bgNearB.setAttribute('transform', `translate(${nearOffset + 360} 0)`);

        const weatherPhase = weatherCycle % 1;
        const sunOpacity = weatherPhase < 0.32 ? 0.9 : weatherPhase < 0.52 ? 0.45 : 0.18;
        const cloudOpacity = weatherPhase < 0.2 ? 0.18 : weatherPhase < 0.5 ? 0.72 : weatherPhase < 0.78 ? 0.92 : 0.28;
        const rainOpacity = weatherPhase > 0.52 && weatherPhase < 0.76 ? 0.45 + Math.sin(birdFlapCycle * 0.7) * 0.08 : 0;
        const rainbowOpacity = weatherPhase >= 0.76 ? Math.min(0.75, (weatherPhase - 0.76) * 3.4) : 0;
        const stormWindow = weatherPhase > 0.56 && weatherPhase < 0.68;
        const lightningPulse = stormWindow && Math.sin(birdFlapCycle * 3.2) > 0.92 ? 0.8 : 0;
        const cloudX = 255 - weatherPhase * 54;

        sunEl.setAttribute('opacity', String(sunOpacity));
        cloudEl.setAttribute('opacity', String(cloudOpacity));
        cloudEl.setAttribute('transform', `translate(${cloudX - 255} 0)`);
        rainEl.setAttribute('opacity', String(Math.max(0, rainOpacity)));
        rainEl.setAttribute('transform', `translate(${cloudX - 255} 0)`);
        lightningEl.setAttribute('opacity', String(lightningPulse));
        lightningEl.setAttribute('transform', `translate(${cloudX - 255} 0)`);
        rainbowEl.setAttribute('opacity', String(rainbowOpacity));
      }

      function loop(timestamp) {
        const dt = Math.min(0.04, (timestamp - lastTime) / 1000);
        lastTime = timestamp;
        update(dt);
        render();
        if (running) {
          requestAnimationFrame(loop);
        }
      }

      function jump() {
        if (gameOver) {
          return;
        }
        startMusic();
        if (!started) {
          started = true;
          updateStatus('Hra běží. Hodně štěstí!');
        }
        if (playerOnGround) {
          playerVy = JUMP_VELOCITY;
          playerOnGround = false;
          updateStatus('Skáčeš!');
        }
      }

      window.addEventListener('keydown', (event) => {
        if (['Space', 'ArrowUp', 'ArrowDown', 'KeyR'].includes(event.code)) {
          event.preventDefault();
        }
        keys.add(event.code);
        if (event.code === 'Space' || event.code === 'ArrowUp') {
          jump();
        }
        if (event.code === 'KeyR') {
          reset();
        }
      });

      window.addEventListener('keyup', (event) => {
        keys.delete(event.code);
      });

      const jumpButton = document.getElementById('jumpBtn');
      jumpButton.addEventListener('click', jump);
      jumpButton.addEventListener('pointerdown', handlePressJump);

      restartButton.addEventListener('click', reset);
      restartButton.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        reset();
      });
      soundToggle.addEventListener('click', toggleSound);
      volumeControl.addEventListener('input', () => {
        volumeLevel = Number(volumeControl.value) / 100;
        ensureAudioContext();
        syncVolume();
      });

      gameWindow.addEventListener('click', () => {
        gameWindow.focus();
        if (gameOver) {
          reset();
        }
      });

      gameWindow.addEventListener('pointerdown', handlePressJump);

      gameWindow.addEventListener('focus', () => {
        gameWindow.style.outline = '3px solid #93c5fd';
      });

      gameWindow.addEventListener('blur', () => {
        gameWindow.style.outline = 'none';
      });

      updateStatus('Stiskni mezerník pro start.');
      announceScore();
      syncVolume();
      lastTime = performance.now();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
